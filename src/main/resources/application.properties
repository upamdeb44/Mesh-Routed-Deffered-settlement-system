#server
server.port=8080

#H2 in-memory database
spring.datasource.url=jdbc:h2:mem:upimesh
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

#H2 webconsole at localhost
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

#Logging
logging.level.com.demo.upimesh=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

#Idempotency window
upi.mesh.idempotency-ttl-seconds=86400

#packet freshness widow
upi.mesh.packet-max-age-seconds=86400

spring.application.name=upi-offline-mesh
